<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./images/bacefook.png">
    <title>Bacefook</title>
</head>
<body>
    <div class="top-section">
        <div class="top-left">
            <img class="logo" src="./images/bacefook.png" alt="Bacefook Logo">
        <form class="searchform">
            <img class="searchicon" src="./images/magnifying-glass.png" alt="Search Icon">
            <input class="searchbar" type="text" placeholder="Search Bacefook">
        </form>
        </div>
        <div class="top-mid">
        <!--end of left part, start of middle part-->
        <a href="home.html" title="Home" class="home"><img src="./images/home.png" alt="Home Icon"></a>
        <a href="video.html" title="Video" class="video"><img src="./images/video.png" alt="Video Icon"></a>
        <a href="friends.html" title="Friends" class="friends"><img src="./images/users.png" alt="Friends Icon"></a>
        <a href="marketplace.html" title="Marketplace" class="marketplace"><img src="./images/market.png" alt="Marketplace Icon"></a>
        <a href="gaming.html" title="Gaming" class="gaming"><img src="./images/gaming.png" alt="Gaming Icon"></a>
        </div>
        <div class="top-right">
        <!--end of middle part, start of right part-->
        <a href="menu.html" title="Menu"><img class="menu" src="./images/menu.png" alt="Menu Icon"></a>
        <a href="chats.html" title="Chats"><img class="chats" src="./images/chat.png" alt="Chats Icon"></a>
        <a href="notifications.html" title="Notifications"><img class="notifications" src="./images/bell.png" alt="Notifications Icon"></a>
        <a href="account.html" title="Account"><img id="account" src="./images/goober.png" alt="Account Icon"></a>
        </div>
        <!--end of right part-->
    </div>
    <!--homepage start-->
    <div class="homepage">
        <!--left section start-->
        <div class="left-part">
            <div class="menubuttons">
                <button class="menubutton"><img class="profileicon" src="./images/goober.png" alt="Friends Icon">Me</button>
                <button class="menubutton"><img class="friendicon" src="./images/users.png" alt="Friends Icon">Friends</button>
                <button class="menubutton"><img class="memoriesicon" src="./images/memories.png" alt="Memories Icon">Memories</button>
                <button class="menubutton"><img class="savedicon" src="./images/saved.png" alt="Saved Icon">Saved</button>
                <button class="menubutton"><img class="groupsicon" src="./images/groups.png" alt="Groups Icon">Groups</button>
                <button class="menubutton"><img class="reelsicon" src="./images/video.png" alt="Reels Icon">Reels</button>
                <button class="menubutton"><img class="marketplaceicon" src="./images/market.png" alt="Marketplace Icon">Marketplace</button>
            </div>
            <div class="shortcuts">
                <h2>Shortcuts</h2>
                <button class="shortcut"><img class="shortcut1" src="./images/jaihater.jpg" alt="Shortcut 1">Jai Haters Club</button>
            </div>
        </div>
        <!--left section end, start of middle section-->
        <div class="mid-part">
            <!-- create bar -->
            <div class="createbar">
                <img id="profile" src="./images/goober.png" alt="Profile Picture">
                <form class="createform">
                <input class="searchbar" type="text" placeholder="What's on your mind, Goober?">
                </form>
                <a href="live.html" title="Live"><img class="live" src="./images/live.png" alt="Live Icon"></a>
                <a href="gallery.html" title="Gallery"><img class="gallery" src="./images/gallery.png" alt="Gallery Icon"></a>
                <a href="feeling.html" title="Feeling"><img class="feeling" src="./images/smiley.png" alt="Feeling Icon"></a>
            </div>
            <!-- end of create bar, start of posts-->
             <div class="postcontainer">
                <div class=postcard>
                    <div class="postheader">
                        <div class="postheaderleft">
                            <img src="./images/goober.png">
                            <p>Goober</p>
                        </div>
                        <div class="postheaderright">
                            <img src="./images/dots-three.png">
                            <img src="./images/x.png">
                        </div>
                    </div>
                    <div class="postcaption">
                        <p>Living the life.</p>
                    </div>
                    <div class="postimage">
                        <img src="./images/goober.png">
                    </div>
                    <div class="poststats"> 
                        <img src="./images/thumbs-up.png">
                        <p>67</p>
                        <img src="./images/chats-circle.png">
                        <p>420</p>
                        <img src="./images/share-fat.png">
                        <p>911</p>
                    </div>
                </div>
             </div>
        </div>
        <div class="right-part">
            <div class="contactsmenu">
                <div class="contactsheader">
                    <div class="contactsheaderleft">
                        <p>Contacts</p>
                    </div>
                    <div class="contactsheaderight">
                        <img src="./images/magnifying-glass.png">
                        <img src="./images/dots-three.png">
                    </div>
                </div>
                <div class="contactsbuttons">
                    <button class="contact"><img class="contact1" src="./images/joserizal.png" alt="Contact 1">Jose Rizal</button>
                    <button class="contact"><img class="contact1" src="./images/omniman.png" alt="Contact 1">Omni-Man</button>
                    <button class="contact"><img class="contact1" src="./images/shrek.png" alt="Contact 1">Shrek</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
